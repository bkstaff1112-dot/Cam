<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عداد الحضور الذكي بالوجه</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #ffca28;
            margin-bottom: 5px;
            font-size: 24px;
        }
        #status {
            margin-bottom: 15px;
            color: #ff9100;
            font-size: 14px;
            background: #222;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: center;
            max-width: 600px;
        }
        .container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* عكس الكاميرا كالمرأة لتكون الحركة طبيعية للمستخدم */
        #video, #overlay {
            transform: scaleX(-1);
        }
        .stats-panel {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            width: 640px;
        }
        .card {
            flex: 1;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #333;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #aaa;
        }
        .card p {
            margin: 0;
            font-size: 36px;
            font-weight: bold;
            color: #00e676;
        }
        /* لتناسب الشاشات الصغيرة والهواتف */
        @media (max-width: 680px) {
            .container, .stats-panel {
                width: 95vw;
                height: calc(95vw * 0.75);
            }
            .stats-panel { height: auto; flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <h1>عداد الحضور الحسينى الذكي (بالوجه)</h1>
    <div id="status">جاري الاتصال بخوادم الذكاء الاصطناعي وتحميل النماذج...</div>

    <div class="container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="stats-panel">
        <div class="card">
            <h3>الحضور أمام الكاميرا الآن</h3>
            <p id="current-count">0</p>
        </div>
        <div class="card">
            <h3>إجمالي الحضور (بدون تكرار)</h3>
            <p id="total-count" style="color: #ffca28;">0</p>
        </div>
    </div>

    <script>
