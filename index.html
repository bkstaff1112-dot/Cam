<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عداد الحضور الذكي بالوجه</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #ffca28;
            margin-bottom: 5px;
            font-size: 24px;
        }
        #status {
            margin-bottom: 15px;
            color: #ff9100;
            font-size: 14px;
            background: #222;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: center;
            max-width: 600px;
        }
        .container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #video, #overlay {
            transform: scaleX(-1);
        }
        .stats-panel {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            width: 640px;
        }
        .card {
            flex: 1;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #333;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #aaa;
        }
        .card p {
            margin: 0;
            font-size: 36px;
            font-weight: bold;
            color: #00e676;
        }
        @media (max-width: 680px) {
            .container, .stats-panel {
                width: 95vw;
                height: calc(95vw * 0.75);
            }
            .stats-panel { height: auto; flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <h1>عداد الحضور الحسينى الذكي (بالوجه)</h1>
    <div id="status">جاري تشغيل محرك الذكاء الاصطناعي فائق السرعة...</div>

    <div class="container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="stats-panel">
        <div class="card">
            <h3>الحضور أمام الكاميرا الآن</h3>
            <p id="current-count">0</p>
        </div>
        <div class="card">
            <h3>إجمالي الحضور (بدون تكرار)</h3>
            <p id="total-count" style="color: #ffca28;">0</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusText = document.getElementById('status');
        const currentCountEl = document.getElementById('current-count');
        const totalCountEl = document.getElementById('total-count');

        let savedFaceDescriptors = []; 
        const DISTANCE_THRESHOLD = 0.55; 

        // 1. تحميل النماذج من خادم CDN فائق السرعة يدعم الكاش والتخزين المؤقت
        async function loadModels() {
            // استخدام رابط الـ CDN المباشر والمضغوط لتسريع التحميل 10 أضعاف
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            
            try {
                statusText.innerText = "جاري تهيئة الذاكرة الذكية السريعة...";
                
                // تحميل المتطلبات بالتوازي (Parallel) بدلاً من تحميلها واحداً تلو الآخر لتوفير الوقت
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                
                statusText.innerText = "تم تشغيل الذكاء الاصطناعي بنجاح! جاري فتح الكاميرا...";
                startVideo();
            } catch (error) {
                statusText.innerHTML = "<span style='color: #ff1744;'>فشل التحميل. تأكد من تفعيل السيرفر المحلي (Live Server) وتحديث الصفحة.</span>";
                console.error(error);
            }
        }

        // 2. تشغيل الكاميرا
        function startVideo() {
            navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, facingMode: "user" } 
            })
            .then(stream => {
                video.srcObject = stream;
                statusText.innerText = "النظام يعمل الآن بكفاءة كاملة.";
            })
            .catch(err => {
                statusText.innerHTML = "<span style='color: #ff1744;'>خطأ: يرجى السماح للمتصفح بالوصول إلى الكاميرا من إعدادات القفل بالأعلى.</span>";
            });
        }

        // 3. المعالجة والعد المستمر
        video.addEventListener('play', () => {
            setInterval(async () => {
                if (video.paused || video.ended) return;

                // تم تصغير حجم المعالجة (inputSize: 128) ليعمل بسرعة فائقة حتى على الهواتف الضعيفة
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 128, scoreThreshold: 0.5 }))
                    .withFaceLandmarks()
                    .withFaceDescriptors();

                currentCountEl.innerText = detections.length;

                const displaySizeCurrent = { width: video.offsetWidth, height: video.offsetHeight };
                faceapi.matchDimensions(canvas, displaySizeCurrent);
                const resizedDetections = faceapi.resizeResults(detections, displaySizeCurrent);
                
                const context = canvas.getContext('2d');
                context.clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, resizedDetections);

                detections.forEach(detection => {
                    const currentDescriptor = detection.descriptor;
                    let isNewFace = true;

                    for (let savedDescriptor of savedFaceDescriptors) {
                        const distance = faceapi.euclideanDistance(currentDescriptor, savedDescriptor);
                        if (distance < DISTANCE_THRESHOLD) {
                            isNewFace = false;
                            break;
                        }
                    }

                    if (isNewFace) {
                        savedFaceDescriptors.push(currentDescriptor);
                        totalCountEl.innerText = savedFaceDescriptors.length;
                    }
                });

            }, 500); // يفحص مرتين في الثانية الواحدة وهي سرعة ممتازة للوجوه المتحركة
        });

        window.onload = loadModels;
    </script>
</body>
</html>
