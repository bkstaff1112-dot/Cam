<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة البث المباشر الموحدة للهاتف</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0e12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-top: 10px;
        }
        h2 { font-size: 1.4rem; color: #00ffcc; }
        p { font-size: 0.85rem; color: #777; margin-top: 5px; }

        .video-wrapper {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16; /* أبعاد طولية متناسبة مع شاشات الهواتف */
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #1f2330;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .live-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff3b30;
            color: #fff;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            display: none;
        }
        .footer {
            width: 100%;
            max-width: 400px;
            padding-bottom: 15px;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #00ffcc, #00b3ff);
            color: #000;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
            -webkit-tap-highlight-color: transparent;
        }
        button:disabled {
            background: #222 !important;
            color: #555 !important;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>البث الفوري الموحد</h2>
        <p>قم بالبث مباشرة لليوتيوب والفيسبوك من هافتك</p>
    </div>

    <div class="video-wrapper">
        <div class="live-indicator" id="liveBadge">LIVE</div>
        <video id="cameraPreview" autoplay muted playsinline></video>
    </div>

    <div class="footer">
        <button id="streamBtn">ابدأ البث المباشر الآن</button>
    </div>

    <script>
        const videoElement = document.getElementById('cameraPreview');
        const streamButton = document.getElementById('streamBtn');
        const liveBadge = document.getElementById('liveBadge');
        let mediaRecorder;
        let webSocket;

        // إعدادات الكاميرا الطولية المناسبة لرفع شبكات الموبايل
        const cameraConstraints = {
            video: {
                facingMode: "user", // "user" للأمامية (سيلفي) و "environment" للخلفية
                width: { ideal: 720 },
                height: { ideal: 1280 }
            },
            audio: true
        };

        // تشغيل الكاميرا تلقائياً عند فتح الملف
        navigator.mediaDevices.getUserMedia(cameraConstraints)
            .then(stream => {
                videoElement.srcObject = stream;

                streamButton.addEventListener('click', () => {
                    // هنا نربط المتصفح بالسيرفر الوسيط الذي يقوم بالتحويل لـ RTMP لليوتيوب والفيسبوك
                    // استبدل لـ IP السيرفر الخاص بك أو رابط ngrok الآمن
                    const serverStreamUrl = "ws://" + window.location.hostname + ":3000"; 
                    webSocket = new WebSocket(serverStreamUrl);

                    webSocket.onopen = () => {
                        streamButton.disabled = true;
                        streamButton.innerText = "🔴 أنت الآن مباشر على المنصات";
                        streamButton.style.background = "#ff3b30";
                        streamButton.style.color = "#fff";
                        liveBadge.style.display = "block";

                        // تسجيل وبث البيانات بصيغة مدعومة للبث الحي وبمعدل نقل مستقر للموبايل
                        mediaRecorder = new MediaRecorder(stream, {
                            mimeType: 'video/webm; codecs=vp9',
                            videoBitsPerSecond: 1500000 // 1.5 Mbps تناسب سرعات رفع الهواتف
                        });

                        // إرسال داتا الفيديو مجزأة كل 100 ملي ثانية بدون تأخير
                        mediaRecorder.ondataavailable = (event) => {
                            if (event.data.size > 0 && webSocket.readyState === WebSocket.OPEN) {
                                webSocket.send(event.data);
                            }
                        };
                        
                        mediaRecorder.start(100); 
                    };

                    webSocket.onclose = () => {
                        alert("انقطع الاتصال بالسيرفر الوسيط.");
                        location.reload();
                    };
                });
            })
            .catch(error => {
                alert("تنبيه: يجب إعطاء صلاحية الكاميرا والميكروفون للمتصفح أولاً.");
                console.error(error);
            });
    </script>
</body>
</html>
